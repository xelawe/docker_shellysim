services:
  shellysim:
    build: .
    container_name: shellysim
    restart: unless-stopped
    ports:
      - "80:80"          # EET Solmate polls this port
    environment:
      # ── MQTT broker ────────────────────────────────────────────────────────
      MQTT_HOST: "192.168.1.10"   # ← your broker IP / hostname
      MQTT_PORT: "1883"
      MQTT_USER: ""               # leave empty if no auth required
      MQTT_PASS: ""
      # ── Topics ─────────────────────────────────────────────────────────────
      # Publish your house-power reading (in watts) to this topic
      MQTT_TOPIC_IN: "shellysim/cmnd/apower"
      # ── HTTP ───────────────────────────────────────────────────────────────
      HTTP_PORT: "80"
      MQTT_CLIENT: "shellysim"
